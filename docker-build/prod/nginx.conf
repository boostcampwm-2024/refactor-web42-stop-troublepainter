server {
    listen 80;
    server_name re-troublepainter.kro.kr;
    return 301 https://$server_name$request_uri;
}
server {
    # http2, 3 on
    listen 443 ssl;
    listen 443 quic reuseport;

    worker_processes auto;

    add_header Alt-Svc 'h3=":443";ma=86400,h3-29=":443";ma=86400,h3-27=":443";ma=86400';

    server_name re-troublepainter.kro.kr;

    ssl_certificate /etc/letsencrypt/live/re-troublepainter.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/re-troublepainter.kro.kr/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://server:3000/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
