services:
  server:
    image: ${DOCKERHUB_USERNAME}/troublepainter-server:latest
    container_name: troublepainter_server
    environment:
      - NODE_ENV=production
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - CLOVA_API_KEY=${CLOVA_API_KEY}
      - CLOVA_GATEWAY_KEY=${CLOVA_GATEWAY_KEY}
      - CLOVA_OCR_SECRET_KEY=${CLOVA_OCR_SECRET_KEY}
      - CLOVA_OCR_INVOKE_URL=${CLOVA_OCR_INVOKE_URL}
      - CLOVA_STUDIO_API_KEY=${CLOVA_STUDIO_API_KEY}
      - CLOVA_STUDIO_REQUEST_ID=${CLOVA_STUDIO_REQUEST_ID}
    networks:
      - app_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '10'
    volumes:
      - "./logs:/app/logs"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: ${DOCKERHUB_USERNAME}/troublepainter-nginx:latest
    container_name: troublepainter_nginx
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./log:/var/log/nginx
    user: root
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    depends_on:
      - server
    networks:
      - app_network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '10'
    restart: unless-stopped

networks:
  app_network:
    name: app_network
    driver: bridge
